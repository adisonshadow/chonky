nodeLinker: node-modules

# Use the public npm registry for installs and for `yarn npm publish`
npmRegistryServer: "https://registry.npmjs.org/"
npmPublishRegistry: "https://registry.npmjs.org/"

# Scoped publish: registry URLs only (yarnpkg/berry#2790). Do NOT set npmAuthToken here
# with ${YARN_NPM_AUTH_TOKEN:-} — the top-level Yarn process expands that before your
# release script exports the token, which pins an empty scope token and breaks auth.
npmScopes:
  chonkylang:
    npmRegistryServer: "https://registry.npmjs.org/"
    npmPublishRegistry: "https://registry.npmjs.org/"
